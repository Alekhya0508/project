<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task 2 - Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR (Flexbox) -->
<header class="navbar">
  <h2>My Dashboard</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#">Contact</a>
    <a href="#">Tasks</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Welcome 👋</h1>
  <p>Task 2 - Intermediate HTML, CSS, JS Project</p>
  <button id="btn">Click Me</button>
</section>

<!-- GRID LAYOUT SECTION -->
<section class="grid-container">

  <!-- CONTACT FORM -->
  <div class="card">
    <h2>Contact Form</h2>

    <form id="contactForm">
      <input type="text" id="name" placeholder="Enter Name">
      <input type="email" id="email" placeholder="Enter Email">
      <button type="submit">Submit</button>
    </form>

    <p id="msg"></p>
  </div>

  <!-- TO DO LIST -->
  <div class="card">
    <h2>To-Do List</h2>

    <input type="text" id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="list"></ul>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
